<!DOCTYPE html>
<html>
<head>
    <title>Camera Dashboard - Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .camera-box {
            border-radius: 15px;
            overflow: hidden;
            background: #ddd;
        }

        .camera-box img {
            width: 100%;
            border-radius: 15px;
        }

        .buttons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        .start-btn {
            background: linear-gradient(45deg, #38ef7d, #11998e);
        }

        .end-btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
        }

        button:hover {
            opacity: 0.85;
        }

        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Camera Dashboard - Attendance</h2>

    <div class="camera-box">
        <!-- STREAM ALWAYS VISIBLE -->
        <img id="videoFeed" src="/video_feed" alt="Camera Feed">
    </div>

    {% if request.args.get('mode') != 'register' %}
    <div class="buttons">
        <button class="start-btn" onclick="startAttendance()">Take Attendance</button>
        <button class="end-btn" onclick="endAttendance()">End Attendance</button>
    </div>
    {% endif %}

    {% if request.args.get('mode') == 'register' %}
    <div style="margin-top: 30px;">
        <h3 style="margin-bottom: 10px;">Enter Student Name</h3>
        <input type="text" id="studentName" placeholder="Enter student name"
               style="padding: 12px; width: 60%; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;">
        <br>
        <button onclick="registerFace()"
                style="margin-top: 15px; padding: 12px 20px; border-radius: 8px;
                       background: linear-gradient(to right, #28a745, #48d17c);
                       border: none; color: white; font-size: 16px; cursor: pointer;">
            📷 Register Face
        </button>
        <p id="registerStatus" style="margin-top: 12px; color: green; font-weight: bold;"></p>
    </div>
    {% endif %}

</div>

<script>

// Hidden frontend camera
const video = document.createElement("video");
video.autoplay = true;
video.playsInline = true;
video.style.display = "none";

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

let frameInterval = null;

// Start frontend camera immediately (feed frames silently)
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;

    frameInterval = setInterval(() => {

        if (!video.videoWidth) return;

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0);

        const imageData = canvas.toDataURL("image/jpeg", 0.6);

        fetch("/upload_frame", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: imageData })
        });

    }, 80);  // smooth like before
})
.catch(err => {
    console.error("Camera error:", err);
});


// =======================================
// REGISTER FACE
// =======================================
async function registerFace() {
    const nameInput = document.getElementById("studentName");
    const name = nameInput ? nameInput.value.trim() : null;
    if (!name) {
        alert("Please enter a student name.");
        return;
    }
    const formData = new FormData();
    formData.append("name", name);
    await fetch("/register", { method: "POST", body: formData });
    const status = document.getElementById("registerStatus");
    if (status) status.innerText = "Registering " + name + "... Hold still!";
}

// Auto-fill name from URL param (when student clicks Register Face from portal)
const urlParams = new URLSearchParams(window.location.search);
const prefilledName = urlParams.get("name");
if (prefilledName) {
    const nameInput = document.getElementById("studentName");
    if (nameInput) {
        nameInput.value = prefilledName;
    }
}


// =======================================
// START VERIFYING
// =======================================
function startAttendance() {
    fetch("/start_attendance");
}


// =======================================
// STOP VERIFYING
// =======================================
function endAttendance() {
    fetch("/stop_attendance");
}

</script>

</body>
</html>

<style>
@media (max-width: 480px) {
  .container { margin: 12px auto; padding: 16px; border-radius: 12px; }
  h2 { font-size: 16px; margin-bottom: 14px; }
  .camera-box { border-radius: 10px; }
  .buttons { gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .buttons button { padding: 10px 18px; font-size: 14px; flex: 1; min-width: 120px; }
  input[type="text"] { width: 100%; font-size: 14px; padding: 10px 12px; }
  #registerStatus { font-size: 13px; }
}
</style>
