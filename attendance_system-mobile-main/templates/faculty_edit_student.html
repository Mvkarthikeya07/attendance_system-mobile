<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Student – Attendance System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; min-height: 100vh; }

    nav {
      background: #4f46e5;
      color: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand { font-size: 1.15rem; font-weight: 700; }
    nav .nav-links a {
      color: #c7d2fe;
      text-decoration: none;
      margin-left: 18px;
      font-size: .9rem;
    }
    nav .nav-links a:hover { color: #fff; }

    .wrapper {
      max-width: 540px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #4f46e5;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .back-link:hover { text-decoration: underline; }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 14px rgba(0,0,0,.08);
      padding: 36px 32px;
    }
    .card h2 {
      font-size: 1.3rem;
      color: #1e1b4b;
      margin-bottom: 6px;
    }
    .card .subtitle {
      font-size: .88rem;
      color: #6b7280;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #4f46e5; }

    .alert {
      padding: 11px 16px;
      border-radius: 8px;
      font-size: .88rem;
      margin-bottom: 18px;
    }
    .alert-error { background: #fee2e2; color: #dc2626; border-left: 4px solid #dc2626; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .btn-save {
      flex: 1;
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-save:hover { background: #4338ca; }
    .btn-cancel-link {
      flex: 1;
      text-align: center;
      background: #f3f4f6;
      color: #374151;
      border: none;
      padding: 11px;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    .btn-cancel-link:hover { background: #e5e7eb; }
  </style>
</head>
<body>

<nav>
  <span class="brand">🎓 Attendance System</span>
  <div class="nav-links">
    <a href="/faculty/schedule">Schedule</a>
    <a href="/faculty/students">Students</a>
    <a href="/faculty/logout">Logout</a>
  </div>
</nav>

<div class="wrapper">
  <a href="/faculty/students" class="back-link">← Back to Students</a>

  <div class="card">
    <h2>✏️ Edit Student</h2>
    <p class="subtitle">Update the details for this student record.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" value="{{ student[1] }}" required placeholder="e.g. Arjun Kumar" />
      </div>
      <div class="form-group">
        <label>Registration Number</label>
        <input type="text" name="reg_number" value="{{ student[2] }}" required placeholder="e.g. 2021CS001" />
      </div>
      <div class="form-group">
        <label>College Email</label>
        <input type="email" name="college_email" value="{{ student[3] }}" required placeholder="student@college.edu" />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" value="{{ student[4] }}" required placeholder="+91 9876543210" />
      </div>

      <div class="btn-row">
        <a href="/faculty/students" class="btn-cancel-link">Cancel</a>
        <button type="submit" class="btn-save">Save Changes</button>
      </div>
    </form>
  </div>
</div>

</body>
</html>

<style>
@media (max-width: 480px) {
  nav { padding: 12px 14px; }
  nav .brand { font-size: 1rem; }
  nav .nav-links a { margin-left: 10px; font-size: .8rem; }
  .wrapper { margin: 20px auto; padding: 0 12px; }
  .card { padding: 24px 18px; border-radius: 12px; }
  .card h2 { font-size: 1.1rem; }
  .card .subtitle { font-size: .82rem; margin-bottom: 20px; }
  input[type="text"], input[type="email"], input[type="tel"] { padding: 9px 12px; font-size: .9rem; }
  .form-group { margin-bottom: 14px; }
  label { font-size: .8rem; }
  .btn-save, .btn-cancel-link { padding: 10px; font-size: .9rem; }
  .btn-row { margin-top: 18px; }
}
</style>
