<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .welcome-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .logo p {
            color: #666;
            font-size: 16px;
        }
        .portal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .portal-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .portal-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .portal-card .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .portal-card h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .portal-card p {
            font-size: 14px;
            opacity: 0.9;
        }
        @media (max-width: 480px) {
            .portal-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="logo">
            <h1>📚 Attendance System</h1>
            <p>Face Recognition Based Attendance</p>
        </div>

        <div class="portal-grid">
            <a href="/faculty/login" class="portal-card">
                <div class="icon">👨‍🏫</div>
                <h3>Faculty Portal</h3>
                <p>Manage attendance sessions</p>
            </a>

            <a href="/student/login" class="portal-card">
                <div class="icon">🎓</div>
                <h3>Student Portal</h3>
                <p>Mark your attendance</p>
            </a>
        </div>
    </div>
</body>
</html>

<style>
@media (max-width: 480px) {
  .welcome-container { padding: 28px 20px; }
  .logo h1 { font-size: 24px; }
  .logo p { font-size: 14px; }
  .portal-grid { grid-template-columns: 1fr; gap: 14px; margin-top: 20px; }
  .portal-card { padding: 28px 16px; }
  .portal-card .icon { font-size: 36px; margin-bottom: 10px; }
  .portal-card h3 { font-size: 17px; }
  .portal-card p { font-size: 13px; }
}
</style>
